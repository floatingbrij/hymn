app = 'hymn-music'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "10s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/api/health"

[mounts]
  source = 'hymn_data'
  destination = '/app/server/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
